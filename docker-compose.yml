version: "3.8"

# =============================================================================
# Payment Stream Pipeline — Local Development Stack
#
# Services:
#   spark-master / spark-worker-1 / spark-worker-2  — Standalone Spark cluster
#   postgres                                          — Airflow metadata DB
#   airflow-webserver / airflow-scheduler             — Orchestration
#   kafka / zookeeper / kafka-ui                      — Streaming source (profile: kafka)
#   minio / minio-init                                — S3-compatible storage (profile: kafka)
#   kafka-connect / kafka-connect-init                — Kafka → MinIO bridge (profile: kafka)
#
# Usage:
#   docker-compose up -d                              # Spark + Airflow only (file mode)
#   docker-compose --profile kafka up -d              # Full stack with Kafka + MinIO
# =============================================================================

x-spark-common: &spark-common
  build:
    context: .
    dockerfile: Dockerfile.spark
  volumes:
    - ./data:/opt/spark/work-dir/data
    - ./src:/opt/spark/work-dir/src
    - ./config:/opt/spark/work-dir/config
  environment:
    - SPARK_MODE=worker
    - SPARK_MASTER_URL=spark://spark-master:7077
  env_file:
    - .env
  networks:
    - pipeline-net

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: "/opt/airflow"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./src:/opt/airflow/src
    - ./config:/opt/airflow/config
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - pipeline-net

services:
  # ---------------------------------------------------------------------------
  # Spark Cluster
  # ---------------------------------------------------------------------------
  spark-master:
    <<: *spark-common
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8080:8080"   # Spark Master UI
      - "7077:7077"   # Spark submit port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  spark-worker-1:
    <<: *spark-common
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    ports:
      - "8081:8081"
    depends_on:
      spark-master:
        condition: service_healthy

  spark-worker-2:
    <<: *spark-common
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    ports:
      - "8082:8081"
    depends_on:
      spark-master:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Airflow
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-net

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@pipeline.local \
          --password admin
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8085:8080"   # Airflow UI (8080 taken by Spark)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Kafka (optional — set GENERATOR_OUTPUT_MODE=kafka to use)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - pipeline-net
    profiles:
      - kafka

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - pipeline-net
    profiles:
      - kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - pipeline-net
    profiles:
      - kafka

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  #
  # Replaces the local ./data folder when running in Kafka mode.  All storage
  # zone paths (landing, analytics, etc.) point to s3a://pipeline-data/...
  # which resolves to this MinIO instance locally and to AWS S3 / GCS in
  # production — no code changes required, only the S3_ENDPOINT env var.
  #
  # UI: http://localhost:9001  (login: minioadmin / minioadmin)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web UI
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pipeline-net
    profiles:
      - kafka

  # Creates the pipeline-data bucket on first startup then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
        mc mb --ignore-existing local/pipeline-data &&
        echo 'Bucket pipeline-data ready.'
      "
    networks:
      - pipeline-net
    profiles:
      - kafka

  # ---------------------------------------------------------------------------
  # Kafka Connect — drains Kafka topic into MinIO landing zone
  #
  # Reads every message from payment.transactions.raw and writes JSON files to
  # s3a://pipeline-data/landing/transactions/date=YYYY-MM-DD/hour=HH/
  # That path matches exactly what read_json_landing() expects, so the batch
  # jobs can read from MinIO the same way they read from the local ./data folder.
  #
  # REST API: http://localhost:8083
  # ---------------------------------------------------------------------------
  kafka-connect:
    build:
      context: .
      dockerfile: Dockerfile.kafka-connect
    ports:
      - "8083:8083"   # Kafka Connect REST API
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: pipeline-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      # S3 credentials — picked up by EnvironmentVariableCredentialsProvider in the connector
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
    depends_on:
      - kafka
      - minio-init
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - pipeline-net
    profiles:
      - kafka

  # Registers the S3 sink connector once Kafka Connect is healthy then exits.
  kafka-connect-init:
    image: curlimages/curl:latest
    depends_on:
      kafka-connect:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      curl -s -X POST http://kafka-connect:8083/connectors
      -H 'Content-Type: application/json'
      --data @/etc/kafka-connect/s3-sink.json
    volumes:
      - ./kafka-connect:/etc/kafka-connect
    networks:
      - pipeline-net
    profiles:
      - kafka

networks:
  pipeline-net:
    driver: bridge

volumes:
  postgres-data:
  airflow-logs:
  minio-data:
